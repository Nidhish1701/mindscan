version: "3.9"

services:

  api:
    build: .
    container_name: mh_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - MODEL_DIR=${MODEL_DIR:-models}
      - DB_PATH=${DB_PATH:-data/predictions.db}
    restart: unless-stopped
